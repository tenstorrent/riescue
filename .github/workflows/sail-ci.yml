#
# CI workflow: Run riescue compliance tests with Sail as the second-pass ISS.
#
# Flow:
#   1. Install Sail 0.10 binary from GitHub releases (same approach as ACT4)
#   2. Install RISC-V GCC toolchain from riscv-collab releases
#   3. Build Whisper from source (required for first-pass ISS)
#   4. Run ctk --first_pass_iss whisper --second_pass_iss sail
#
# Known failures tracked as GitHub issues:
#   Issue #1  - Machine-mode tests: tohost=0x3 (Sail/Whisper result mismatch)
#   Issue #2  - Supervisor-mode tests: Sail hangs (infinite loop)
#   Issue #3  - SV48/SV57 tests: OOM with 256MB DRAM config
#   Issue #4  - "Unknown section: text" ERROR on every run
#   Issue #5  - --isa flag doesn't constrain compiler march without features block
#   Issue #6  - Default cpu_config is Tenstorrent-internal, breaks external ISS
#   Issue #7  - Sail memory map not auto-constructed from cpu_config mmap

name: RiESCUE Sail ISS Regression

on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

env:
  SAIL_VERSION: "0.10"
  RISCV_TOOLCHAIN_DATE: "2025.07.16"
  WHISPER_REPO: "https://github.com/tenstorrent/whisper.git"

jobs:

  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Pre-commit / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure || true
        # || true: don't fail lint if pre-commit isn't fully configured yet

  # ---------------------------------------------------------------------------
  # Main regression matrix
  # ---------------------------------------------------------------------------
  sail-regression:
    name: "Sail (${{ matrix.isa }}, ${{ matrix.priv_mode }})"
    runs-on: ubuntu-22.04
    # Run all matrix combinations even if some fail — we want full coverage
    # of which tests pass/fail against Sail for Issue tracking purposes.
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        include:
          # Machine-mode bare-metal — most basic, should work end-to-end
          - isa: rv64i
            priv_mode: machine
            paging_mode: disable
            label: "rv64i-machine-bare"

          # Machine-mode with M extension
          - isa: rv64im
            priv_mode: machine
            paging_mode: disable
            label: "rv64im-machine-bare"

          # Machine-mode with FD extensions
          - isa: rv64imafd
            priv_mode: machine
            paging_mode: disable
            label: "rv64imafd-machine-bare"

          # Supervisor-mode bare-metal (known Issue #2: Sail hangs)
          - isa: rv64i
            priv_mode: super
            paging_mode: disable
            label: "rv64i-super-bare"

          # Supervisor-mode SV39 (known Issue #2: Sail hangs)
          - isa: rv64i
            priv_mode: super
            paging_mode: sv39
            label: "rv64i-super-sv39"

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout riescue
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install riescue and dependencies
        run: |
          pip install -e "." || pip install -e ".[dev]" || pip install .

      # -----------------------------------------------------------------------
      # 3. Sail — install pre-built binary from GitHub releases (Sail 0.10)
      #    Same install approach as ACT4 CI.
      # -----------------------------------------------------------------------
      - name: Install Sail RISC-V model
        run: |
          sudo mkdir -p /usr/local
          curl --location \
            https://github.com/riscv/sail-riscv/releases/download/${{ env.SAIL_VERSION }}/sail-riscv-$(uname)-$(arch).tar.gz \
            | sudo tar xvz --directory=/usr/local --strip-components=1
          # Verify
          which sail_riscv_sim
          sail_riscv_sim --version || true
          echo "SAIL_PATH=$(which sail_riscv_sim)" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 4. RISC-V GCC toolchain — pre-built binary from riscv-collab releases
      #    Same install approach as ACT4 CI.
      # -----------------------------------------------------------------------
      - name: Install RISC-V GCC toolchain
        run: |
          curl --location \
            https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/${{ env.RISCV_TOOLCHAIN_DATE }}/riscv64-elf-ubuntu-22.04-gcc-nightly-${{ env.RISCV_TOOLCHAIN_DATE }}-nightly.tar.xz \
            | sudo tar xvJ --directory=/usr/local --strip-components=1
          which riscv64-unknown-elf-gcc
          riscv64-unknown-elf-gcc --version

      # -----------------------------------------------------------------------
      # 5. Whisper — build from source (no pre-built binary available)
      #    Whisper is the first-pass ISS; required even when Sail is second-pass.
      # -----------------------------------------------------------------------
      - name: Cache Whisper build
        id: cache-whisper
        uses: actions/cache@v4
        with:
          path: ~/whisper-install
          key: whisper-${{ runner.os }}-${{ hashFiles('**/whisper/**') }}

      - name: Install Whisper build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libboost-all-dev \
            device-tree-compiler

      - name: Build Whisper
        if: steps.cache-whisper.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 ${{ env.WHISPER_REPO }} ~/whisper-src
          cd ~/whisper-src
          make -j$(nproc)
          mkdir -p ~/whisper-install/bin
          cp build-Linux/whisper ~/whisper-install/bin/whisper

      - name: Add Whisper to PATH
        run: |
          echo "$HOME/whisper-install/bin" >> $GITHUB_PATH
          echo "WHISPER_PATH=$HOME/whisper-install/bin/whisper" >> $GITHUB_ENV

      - name: Verify Whisper
        run: whisper --help 2>&1 | head -3 || true

      # -----------------------------------------------------------------------
      # 6. Write config files
      # -----------------------------------------------------------------------
      - name: Write iss_cpu_config.json
        run: |
          cat > iss_cpu_config.json << 'EOCFG'
          {
              "reset_pc": "0x80000000",
              "mmap": {
                  "dram": {
                      "region0": {
                          "address": "0x80000000",
                          "size": "0x10000000"
                      }
                  },
                  "io": {
                      "clint": { "address": "0x2000000", "size": "0xc000" },
                      "htif":  { "address": "0x70000000", "size": "0x10" }
                  }
              },
              "features": {
                  "rv64": {"supported": true,  "enabled": true,  "randomize": 100},
                  "i":    {"supported": true,  "enabled": true,  "randomize": 100},
                  "m":    {"supported": false, "enabled": false, "randomize": 0},
                  "a":    {"supported": false, "enabled": false, "randomize": 0},
                  "f":    {"supported": false, "enabled": false, "randomize": 0},
                  "d":    {"supported": false, "enabled": false, "randomize": 0},
                  "c":    {"supported": false, "enabled": false, "randomize": 0},
                  "h":    {"supported": false, "enabled": false, "randomize": 0},
                  "v":    {"supported": false, "enabled": false, "randomize": 0},
                  "u":    {"supported": true,  "enabled": true,  "randomize": 100},
                  "s":    {"supported": true,  "enabled": true,  "randomize": 100}
              },
              "mp": "off",
              "num_cpus": "1",
              "test_generation": {
                  "secure_access_probability": 0,
                  "secure_pt_probability": 0,
                  "a_d_bit_randomization": 0,
                  "pbmt_ncio_randomization": 0
              }
          }
          EOCFG

      - name: Write sail_config_override.json
        run: |
          cat > sail_config_override.json << 'EOCFG'
          {
            "memory": {
              "translation": { "dirty_update": true },
              "regions": [
                {
                  "base":  {"len": 64, "value": "0x1000"},
                  "size":  {"len": 64, "value": "0x1000"},
                  "attributes": {
                    "cacheable": true, "coherent": true,
                    "executable": false, "readable": true, "writable": false,
                    "read_idempotent": true, "write_idempotent": true,
                    "misaligned_fault": "NoFault", "reservability": "RsrvNone",
                    "supports_cbo_zero": false
                  },
                  "include_in_device_tree": false
                },
                {
                  "base":  {"len": 64, "value": "0x2000000"},
                  "size":  {"len": 64, "value": "0x2000000"},
                  "attributes": {
                    "cacheable": false, "coherent": true,
                    "executable": false, "readable": true, "writable": true,
                    "read_idempotent": false, "write_idempotent": false,
                    "misaligned_fault": "AlignmentFault", "reservability": "RsrvNone",
                    "supports_cbo_zero": false
                  },
                  "include_in_device_tree": false
                },
                {
                  "base":  {"len": 64, "value": "0x70000000"},
                  "size":  {"len": 64, "value": "0x10"},
                  "attributes": {
                    "cacheable": false, "coherent": true,
                    "executable": false, "readable": true, "writable": true,
                    "read_idempotent": false, "write_idempotent": false,
                    "misaligned_fault": "AlignmentFault", "reservability": "RsrvNone",
                    "supports_cbo_zero": false
                  },
                  "include_in_device_tree": false
                },
                {
                  "base":  {"len": 64, "value": "0x80000000"},
                  "size":  {"len": 64, "value": "0x10000000"},
                  "attributes": {
                    "cacheable": true, "coherent": true,
                    "executable": true, "readable": true, "writable": true,
                    "read_idempotent": true, "write_idempotent": true,
                    "misaligned_fault": "NoFault", "reservability": "RsrvEventual",
                    "supports_cbo_zero": true
                  },
                  "include_in_device_tree": true
                }
              ]
            }
          }
          EOCFG

      # -----------------------------------------------------------------------
      # 7. Run CTK with Sail
      # -----------------------------------------------------------------------
      - name: Run CTK — ${{ matrix.label }}
        id: ctk
        run: |
          ctk --isa ${{ matrix.isa }} \
              --whisper_path $WHISPER_PATH \
              --sail_path $SAIL_PATH \
              --first_pass_iss whisper \
              --second_pass_iss sail \
              --cpuconfig iss_cpu_config.json \
              --sail_config_override sail_config_override.json \
              --test_priv_mode ${{ matrix.priv_mode }} \
              --test_paging_mode ${{ matrix.paging_mode }} \
              --run_dir test_kit_${{ matrix.label }} \
              --logger_level INFO \
              --logger_file ctk_${{ matrix.label }}.log \
          || echo "CTK_EXIT_CODE=$?" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 8. Upload logs always (pass or fail) for debugging
      # -----------------------------------------------------------------------
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sail-logs-${{ matrix.label }}
          path: |
            test_kit_${{ matrix.label }}/
            ctk_${{ matrix.label }}.log
          retention-days: 14

      # -----------------------------------------------------------------------
      # 9. Job summary with known issue links
      # -----------------------------------------------------------------------
      - name: Write job summary
        if: always()
        run: |
          echo "## Sail Regression — ${{ matrix.label }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -z "${CTK_EXIT_CODE}" ]; then
            echo "**All tests passed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Tests failed (exit code: ${CTK_EXIT_CODE})**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Known tracked issues" >> $GITHUB_STEP_SUMMARY
            echo "| Issue | Description |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------------|" >> $GITHUB_STEP_SUMMARY
            echo "| #1 | Machine-mode tohost=0x3 — Sail/Whisper result mismatch |" >> $GITHUB_STEP_SUMMARY
            echo "| #2 | Supervisor-mode tests hang on Sail (infinite loop) |" >> $GITHUB_STEP_SUMMARY
            echo "| #3 | SV48/SV57 OOM — 1GB-aligned address exceeds 256MB DRAM |" >> $GITHUB_STEP_SUMMARY
            echo "| #6 | Default cpu_config 256TB DRAM breaks external ISS |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ELF segment layout" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find test_kit_${{ matrix.label }} -maxdepth 1 -type f ! -name "*.S" ! -name "*.s" ! -name "*.log" ! -name "*.dis" ! -name "*.ld" ! -name "*.o" | while read elf; do
            echo "=== $(basename $elf) ==="
            riscv64-unknown-elf-readelf -l "$elf" 2>/dev/null | grep LOAD || true
          done >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Required status check — passes if all matrix jobs passed or were
  # expected failures (continue-on-error). Only fails on cancelled jobs.
  # ---------------------------------------------------------------------------
  ci_pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [lint, sail-regression]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "CI cancelled"
            exit 1
          fi
          echo "CI complete (failures are expected and tracked as GitHub issues)"
          exit 0
